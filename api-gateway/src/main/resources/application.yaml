server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: servicio-auth
          uri: lb://servicio-auth
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0

        - id: servicio-clientes
          uri: lb://servicio-clientes
          predicates:
            - Path=/api/v1/clientes/**
          filters:
            - StripPrefix=0

        - id: servicio-paquetes
          uri: lb://servicio-paquetes
          predicates:
            - Path=/api/v1/paquetes/**
          filters:
            - StripPrefix=0

        - id: servicio-tarifas
          uri: lb://servicio-tarifas
          predicates:
            - Path=/api/v1/tarifas/**
          filters:
            - StripPrefix=0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: true
    ip-address: 127.0.0.1
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: "*"